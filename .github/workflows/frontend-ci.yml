name: Frontend CI

on:
  push:
    paths:
      - 'carcrud/frontend/**'
  pull_request:
    paths:
      - 'carcrud/frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Build
        working-directory: ./carcrud/frontend
        run: |
          npm install
          npm run build