name: Full Continuous Deployment (Backend + Frontend)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  backend-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Spring Boot Backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend with Maven
        working-directory: ./carcrud
        run: mvn clean package

      - name: List build files
        run: ls -R ./carcrud/target

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: carcrud
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./carcrud/target/carcrud-0.0.1-SNAPSHOT.jar

      - name: Confirm Backend Deployment
        if: success()
        run: |
          echo "=================================="
          echo "🚀 BACKEND DEPLOYED SUCCESSFULLY"
          echo "=================================="
          echo "🌐 URL: ${{ secrets.AZURE_BACKEND_URL }}"
          echo "=================================="

      - name: Wait for backend to be live
        run: |
          echo "🔍 Checking if backend is live..."
          for i in {1..20}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.AZURE_BACKEND_URL }})
            if [ "$status" -eq 200 ]; then
              echo "✅ Backend is LIVE and responding!"
              exit 0
            fi
            echo "⏳ Backend not ready yet... retrying in 10s"
            sleep 10
          done
          echo "❌ Backend did not start in time!"
          exit 1

  frontend-deploy:
    needs: backend-deploy
    runs-on: ubuntu-latest
    name: Build & Deploy React Frontend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./carcrud/frontend
        run: npm install

      - name: Inject backend URL and build frontend
        working-directory: ./carcrud/frontend
        run: |
          echo "REACT_APP_API_URL=${{ secrets.AZURE_BACKEND_URL }}" > .env.production
          npm run build

      - name: Deploy to Azure Static Web Apps
        if: github.ref == 'refs/heads/main'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_WATER_07FDD0C00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "./carcrud/frontend"
          output_location: "build"

  backend-docker:
    needs: backend-deploy
    runs-on: ubuntu-latest
    name: Build Backend Docker Image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t docker23suca12/carcrud-backend:latest ./carcrud

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: docker push docker23suca12/carcrud-backend:latest

  frontend-docker:
    needs: frontend-deploy
    runs-on: ubuntu-latest
    name: Build Frontend Docker Image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t docker23suca12/carcrud-frontend:latest ./carcrud/frontend

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: docker push docker23suca12/carcrud-frontend:latest