name: Full CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    # ---- JAVA SETUP ----
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ---- BACKEND BUILD & SONAR ANALYSIS ----
    - name: Build and Analyze Backend along with sonarcloud
      run: |
        cd carcrud
        mvn clean verify sonar:sonar \
          -Dsonar.projectKey=23suca12devops \
          -Dsonar.organization=23suca12devops-org \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # ---- NODE SETUP ----
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # ---- FRONTEND BUILD ----
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build React frontend
      run: |
        cd frontend
        npm run build

    # ---- DOCKER BUILD ----
    - name: Build Docker image
      run: docker build -t carcrud-app .