name: Backend + Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    name: Build Spring Boot Backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and test backend with Maven
        working-directory: ./carcrud
        run: mvn clean install

  frontend-build-deploy:
    needs: backend-build
    runs-on: ubuntu-latest
    name: Build & Deploy React Frontend to Azure Static Web Apps
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build and Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_WATER_07FDD0C00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "carcrud/frontend"
          output_location: "build"