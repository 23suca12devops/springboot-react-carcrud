name: Full CI/CD (Backend + Frontend)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Spring Boot Backend to Azure App Service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend with Maven
        working-directory: ./carcrud
        run: mvn clean package

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: carcrud   # e.g., carcrud-backend
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./carcrud/target/*.jar

  frontend-deploy:
    needs: backend-deploy
    runs-on: ubuntu-latest
    name: Build & Deploy React Frontend to Azure Static Web Apps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_WATER_07FDD0C00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "carcrud/frontend"
          output_location: "build"